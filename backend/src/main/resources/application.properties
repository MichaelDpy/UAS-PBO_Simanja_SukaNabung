# =============================================
# SiManja Backend â Application Configuration
# =============================================

# Server
server.port=8080

# =============================================
# H2 Database (In-Memory)
# =============================================
spring.datasource.url=jdbc:h2:mem:simanja_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (bisa diakses di http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# =============================================
# JPA / Hibernate
# =============================================
# create-drop: create schema saat start, drop saat stop (untuk in-memory database)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# =============================================
# SQL Init
# =============================================
# Ensure data initialization happens after schema creation
spring.sql.init.mode=never

# =============================================
# JWT Configuration
# =============================================
# Secret key (minimal 256-bit / 32 karakter untuk HS256)
app.jwt.secret=simanja_super_secret_key_minimum_32_characters_for_hs256_algorithm
app.jwt.expiration-ms=86400000

# =============================================
# Logging
# =============================================
logging.level.com.simanja=DEBUG
logging.level.org.springframework.security=WARN
